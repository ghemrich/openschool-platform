# Staging environment — standalone compose file
# Usage: docker compose -f docker-compose.staging.yml --env-file .env.staging up --build -d
name: openschool-staging

services:
  backend:
    build: ./backend
    restart: always
    env_file: .env.staging
    volumes:
      - staging_certificates:/app/data/certificates
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/nginx-staging.conf:/etc/nginx/nginx.conf
      - staging_frontend_build:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - openschool-net

  frontend:
    build: ./frontend
    restart: always
    volumes:
      - staging_frontend_build:/usr/share/nginx/html

volumes:
  staging_pgdata:
  staging_frontend_build:
  staging_certificates:

networks:
  openschool-net:
    external: true
