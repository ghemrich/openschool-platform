name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: cd backend && ruff check .
      - name: Ruff format check
        run: cd backend && ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: Run tests
        run: cd backend && pytest -v --tb=short
      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_CI: ${{ secrets.DISCORD_WEBHOOK_CI }}
        run: |
          ./scripts/discord-notify.sh \
            --status "${{ job.status }}" \
            --title "CI: ${{ github.event.head_commit.message || github.event.pull_request.title || 'PR check' }}" \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --author "${{ github.actor }}" \
            --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
