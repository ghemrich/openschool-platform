name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: cd backend && ruff check .
      - name: Ruff format check
        run: cd backend && ruff format --check .

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npx eslint --max-warnings 0 .
      - name: Prettier format check
        run: cd frontend && npx prettier --check 'src/**/*.{ts,tsx,css}'
      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: Run backend tests
        run: cd backend && pytest -v --tb=short

  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Run frontend tests
        run: cd frontend && npm test
      - name: Build frontend
        run: cd frontend && npm run build
  notify:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - name: Discord notification
        env:
          DISCORD_WEBHOOK_CI: ${{ secrets.DISCORD_WEBHOOK_CI }}
          CI_TITLE: "CI: ${{ github.event.head_commit.message || github.event.pull_request.title || 'PR check' }}"
        run: |
          ./scripts/discord-notify.sh \
            --status "${{ job.status }}" \
            --title "$CI_TITLE" \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --author "${{ github.actor }}" \
            --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
